services:
  # Main Flask backend (Dripp Tracker — Phoenix & Dayaa at LCBO)
  - type: web
    name: drippcan-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    # Long timeout for the Daily A SOD sync (1.5M rows can take ~22 min on free tier)
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 1800 --workers 1 --threads 8
    # Free tier: cold-starts after ~15 min idle (~50s wake). Upgrade to
    # plan: starter ($7/mo, always-on, no cold starts) once volume justifies it.
    plan: starter  # $7/mo always-on (founder-approved 2026-07-14)
    healthCheckPath: /healthz
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false  # set in Render dashboard — NEW Neon project 'drippcan', never another app's DB
      - key: SOD_USER
        sync: false
      - key: SOD_PASSWORD
        sync: false
      - key: SOD_AGENT_ID
        sync: false  # 1113
      - key: ADMIN_TOKEN
        sync: false  # fresh token — do not reuse another app's
      - key: SOD_CRON_TOKEN
        sync: false  # used by the GitHub Action daily wake (.github/workflows/sod-daily.yml)
      - key: OWNER_PASSCODE
        sync: false  # gates the owner (brand) view — generate a strong one at deploy
      - key: RESEND_API_KEY
        sync: false  # email alerts + backup-to-email
      - key: SENTRY_DSN
        sync: false  # optional
      - key: CORS_ORIGINS
        sync: false  # comma-separated; defaults cover drippcan-web.vercel.app + localhost:3002

# NO Render cron block on purpose: the free tier sleeps, so the daily SOD sync
# and live lcbo.com refresh are driven by a GitHub Action instead
# (.github/workflows/sod-daily.yml — wakes the service and hits the protected
# endpoints with the SOD_CRON_TOKEN bearer).
